<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>PMW Design Ops</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --ink: #1a1d21;
    --muted: #6b7280;
    --line: #e5e7eb;
    --accent: #2f6df6;
    --radius: 12px;
    --font: "Figtree", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--line);
    background: var(--card);
  }
  header h1 { margin: 0; font-size: 22px; font-weight: 700; }
  header p { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 32px 64px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    transition: box-shadow .15s ease, transform .15s ease;
  }
  .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,.08); transform: translateY(-2px); }
  .thumb {
    aspect-ratio: 16 / 10;
    background: #eef1f5;
    border-bottom: 1px solid var(--line);
    overflow: hidden;
  }
  .thumb iframe { width: 200%; height: 200%; border: 0; transform: scale(.5); transform-origin: top left; pointer-events: none; }
  .meta { padding: 14px 16px; }
  .meta h3 { margin: 0 0 4px; font-size: 15px; font-weight: 600; }
  .meta span { font-size: 12px; color: var(--muted); }
  .empty {
    text-align: center; color: var(--muted); padding: 80px 20px;
    border: 1px dashed var(--line); border-radius: var(--radius); background: var(--card);
  }
</style>
</head>
<body>
<header>
  <h1>PMW Design Ops</h1>
  <p>Lo-fi prototypes — generated in Cowork, hosted here.</p>
</header>
<div class="wrap">
  <div id="grid" class="grid"></div>
</div>
<script>
  // Loads the list of lo-fis from lofis/manifest.json and renders a gallery.
  // To add a new lo-fi: drop its .html into /lofis and add an entry to manifest.json.
  fetch('manifest.json', { cache: 'no-store' })
    .then(r => r.json())
    .then(items => {
      const grid = document.getElementById('grid');
      if (!items || !items.length) {
        grid.outerHTML = '<div class="empty">No wireframes yet. Add your first one through Cowork.</div>';
        return;
      }
      grid.innerHTML = items.map(it => `
        <a class="card" href="${it.file}">
          <div class="thumb"><iframe src="${it.file}" loading="lazy" tabindex="-1"></iframe></div>
          <div class="meta">
            <h3>${it.title}</h3>
            <span>${it.updated || ''}</span>
          </div>
        </a>`).join('');
    })
    .catch(() => {
      document.getElementById('grid').outerHTML =
        '<div class="empty">Could not load manifest.json. (This works once hosted on GitHub Pages.)</div>';
    });
</script>
</body>
</html>
