  :root {
    /* PMW neutral palette (gray-5 / gray-7 / gray-30 / gray-70 / gray-80) + brand blue */
    --bg: #FAFAFA;            /* page surface — bg-neutral-alt-primary (gray-5) */
    --card: #FFFFFF;          /* bg-neutral-primary (gray-0) */
    --surface: #F2F2F5;       /* inset/hover — bg-neutral-secondary (gray-7) */
    --ink: #16161D;           /* ct-neutral-primary (gray-80) */
    --muted: #757589;         /* ct-neutral-secondary (gray-70) */
    --line: #E6E6EC;          /* br-neutral-primary (gray-30) */
    --line-hover: #D8D8E0;
    --accent: #2F6DF6;
    --radius: 20px;           /* corner-radius-20 — cards */
    --font: "Figtree", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: var(--font); background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 56px 32px 80px; }
  h2 { font-size: 15px; font-weight: 600; color: var(--muted); letter-spacing: normal; margin: 40px 0 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; align-items: start; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; text-decoration: none; color: inherit; display: flex; flex-direction: column; box-shadow: 0 1px 2px rgba(20,19,37,.04); transition: box-shadow .18s ease, transform .18s ease, border-color .18s ease; }
  .card:hover { box-shadow: 0 12px 32px rgba(20,19,37,.10); transform: translateY(-4px); border-color: var(--line-hover); }
  .card.main { border-color: var(--line); }
  .thumb { padding: 16px 16px 0; background: var(--card); }
  .thumb-frame { height: 104px; border-radius: 12px; overflow: hidden; position: relative; background: var(--surface); border: 1px solid var(--line); }
  .thumb-frame iframe { width: 333%; height: 333%; border: 0; transform: scale(.30); transform-origin: top left; pointer-events: none; }
  .meta { padding: 20px 16px 16px; display: flex; align-items: center; gap: 12px; }
  /* Task & Main cards: small thumb top-left + status top-right, title/time full-width at bottom */
  .card:not(.create-card){ flex-direction: column; gap: 16px; padding: 16px; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .card:not(.create-card) .thumb { padding: 0; width: 132px; flex-shrink: 0; }
  .card:not(.create-card) .thumb-frame { width: 132px; height: 80px; }
  .card:not(.create-card) .thumb-frame iframe { width: 800%; height: 800%; transform: scale(.125); }
  .card:not(.create-card) .meta { padding: 0; display: block; }
  .meta .t { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .meta h3 { margin: 0; font-size: 14px; font-weight: 600; line-height: 1; letter-spacing: normal; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meta span { font-size: 12px; line-height: 1; color: var(--muted); }
  .badge { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
  .badge.main { background: var(--ink); color: #fff; }                 /* Production — dark */
  .badge.open { background: #E6EEFF; color: #2F6DF6; }                 /* N Comments — blue */
  .badge.ready { background: #EDEDF1; color: #757589; }                /* In progress — grey */
  .badge.merged { background: #E7F7EE; color: #137333; }               /* Done — green */
  .more-btn { height: 40px; padding: 0 16px; border: 1px solid var(--line); background: var(--card); border-radius: 12px; font-size: 14px; font-weight: 600; color: var(--ink); cursor: pointer; font-family: inherit; transition: border-color .15s ease; }
  .more-btn:hover { border-color: var(--line-hover); }
  .badge.loading { color: transparent; min-width: 64px; background: linear-gradient(90deg, #ECECF0 25%, #FAFAFA 50%, #ECECF0 75%); background-size: 200% 100%; animation: pv-shimmer 1.2s ease-in-out infinite; }
  @keyframes pv-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .empty { text-align: center; color: var(--muted); padding: 64px 20px; border: 1px dashed var(--line); border-radius: var(--radius); background: var(--card); font-size: 14px; }
  .create-card { border: 1px dashed var(--line); background: var(--card); box-shadow: none; align-items: center; justify-content: center; min-height: 160px; cursor: pointer; }
  .create-card:hover { border-color: var(--accent); background: var(--card); transform: translateY(-4px); box-shadow: 0 8px 24px rgba(20,19,37,.06); }
  .create-inner { display: flex; flex-direction: column; align-items: center; gap: 12px; color: var(--muted); }
  .create-card:hover .create-inner { color: var(--accent); }
  .create-plus { width: 40px; height: 40px; border-radius: 99px; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 24px; line-height: 1; }
  .create-card:hover .create-plus { background: rgba(47,109,246,.12); }
  .create-label { font-size: 14px; font-weight: 600; }
  body[data-role="view"] .create-card { display: none; }
  .branch-empty { grid-column: 1 / -1; color: var(--muted); font-size: 14px; padding: 4px; }
  .cl-card { cursor: pointer; padding: 0; }
  .cl-frame { padding: 8px 10px; background: var(--card); }
  .cl-frame .cl-prev-row { padding: 5px 0; gap: 2px; }
  .cl-frame .cl-prev-branch { font-size: 11px; }
  .cl-frame .cl-prev-meta { font-size: 9px; }
  .cl-card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .cl-card-ico { width: 36px; height: 36px; border-radius: 99px; background: var(--surface); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .cl-card-ico svg { width: 20px; height: 20px; color: var(--ink); }
  .cl-card-top h3 { margin: 0; font-size: 16px; font-weight: 600; line-height: 1; }
  .cl-card-prev { flex: 1; display: flex; flex-direction: column; }
  .cl-prev-row { display: flex; flex-direction: column; gap: 4px; padding: 8px 0; border-top: 1px solid var(--line); }
  .cl-prev-row:first-child { border-top: none; }
  .cl-prev-branch { font-size: 14px; font-weight: 600; line-height: 1; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cl-prev-meta { color: var(--muted); font-size: 12px; line-height: 1; }
  .cl-card-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; text-align: center; }
  .cl-card-foot { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); color: var(--accent); font-size: 14px; font-weight: 600; }
  .cl-overlay { position: fixed; inset: 0; background: rgba(20,19,37,.45); display: none; align-items: center; justify-content: center; z-index: 1100; padding: 24px; }
  .cl-overlay.show { display: flex; }
  .cl-modal { width: 560px; max-width: 94vw; max-height: 80vh; background: var(--card); border-radius: 24px; box-shadow: 0 24px 64px rgba(20,19,37,.2); display: flex; flex-direction: column; overflow: hidden; }
  .cl-modal-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--line); }
  .cl-modal-head h3 { margin: 0; font-size: 20px; font-weight: 600; line-height: 1; }
  .cl-modal-x { width: 32px; height: 32px; border: none; background: none; font-size: 22px; line-height: 1; color: var(--muted); cursor: pointer; border-radius: 8px; }
  .cl-modal-x:hover { background: var(--surface); color: var(--ink); }
  .cl-modal-body { overflow: auto; padding: 8px; }
  .cl-row { display: flex; align-items: baseline; gap: 12px; padding: 12px; border-radius: 8px; text-decoration: none; color: inherit; flex-wrap: wrap; }
  .cl-row:hover { background: var(--surface); }
  .cl-branch { font-size: 14px; font-weight: 600; color: var(--ink); }
  .cl-meta { color: var(--muted); font-size: 14px; }
  .cl-go { margin-left: auto; color: var(--accent); font-size: 14px; font-weight: 600; }
  .cl-empty { color: var(--muted); font-size: 14px; padding: 24px 12px; text-align: center; }
  .dash-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; padding: 12px 20px; border-radius: 12px; font-size: 14px; z-index: 1000; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .dash-toast.show { opacity: 1; }
  .np-overlay { position: fixed; inset: 0; background: rgba(20,19,37,.45); display: none; align-items: center; justify-content: center; z-index: 1100; }
  .np-overlay.show { display: flex; }
  .np-card { width: 380px; max-width: 92vw; background: var(--card); border-radius: 24px; padding: 24px; box-shadow: 0 24px 64px rgba(20,19,37,.2); }
  .np-card h3 { margin: 0 0 4px; font-size: 20px; font-weight: 600; line-height: 1; }
  .np-card p { margin: 0 0 16px; color: var(--muted); font-size: 14px; }
  .np-card input { width: 100%; height: 40px; border: 1px solid var(--line); border-radius: 12px; padding: 0 12px; font-size: 14px; font-family: inherit; color: var(--ink); outline: none; box-sizing: border-box; }
  .np-card input:focus { border-color: var(--accent); }
  .np-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
  .np-btn { height: 40px; padding: 0 16px; border-radius: 12px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; border: none; }
  .np-ghost { background: transparent; color: var(--muted); }
  .np-primary { background: var(--ink); color: #fff; }
</style>
</head>
<body>
<div class="wrap">
  <h2>PosterMyWall</h2>
  <div id="main-wrap" class="grid"></div>
  <h2 style="margin-top:36px;">Tasks</h2>
  <div id="branch-grid" class="grid"></div>
  <div style="margin-top:18px;"><button id="branch-more" class="more-btn" style="display:none;"></button></div>
</div>
<div class="cl-overlay" id="cl-overlay"><div class="cl-modal"><div class="cl-modal-head"><h3>Updates</h3><button class="cl-modal-x" id="cl-close">&times;</button></div><div class="cl-modal-body" id="cl-list"></div></div></div>
<div id="dash-toast" class="dash-toast"></div>
<div class="np-overlay" id="np-overlay"><div class="np-card"><h3>Create new lo-fi</h3><p>Give your new lo-fi (branch) a name.</p><input id="np-input" type="text" placeholder="e.g. Checkout redesign" maxlength="60"><div class="np-actions"><button class="np-btn np-ghost" id="np-cancel">Cancel</button><button class="np-btn np-primary" id="np-ok">Create</button></div></div></div>
<script>
  var SB_URL="https://oglajrkysripzcyahlux.supabase.co";
  var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nbGFqcmt5c3JpcHpjeWFobHV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NjUyMDUsImV4cCI6MjA5NzM0MTIwNX0.2Fjx1ugopkUP_QaHGFVIH49vQi5ck0k93oUsSPOMWoo";
  var H={apikey:SB_KEY,Authorization:"Bearer "+SB_KEY};
  var namesMap={};
  function fmt(iso){try{var d=new Date(iso),s=Math.max(0,(Date.now()-d.getTime())/1000);if(s<10)return 'now';if(s<60)return Math.floor(s)+'s';var m=Math.floor(s/60);if(m<60)return m+'m';var h=Math.floor(m/60);if(h<24)return h+'h';var dd=Math.floor(h/24);if(dd<7)return dd+'d';var w=Math.floor(dd/7);if(w<5)return w+'w';return d.toLocaleDateString([],{month:'short',day:'numeric'});}catch(e){return '';}}
  function mid(file){return file.replace('.html','');}
  function card(it){
    var isMain=!!it.main;
    var nm=namesMap[mid(it.file)];var label=isMain?(nm||'Lofi'):(nm||it.name||'New Lofi');
    var badge=(!isMain&&it.status==='merged')?'<span class="badge merged">Done</span>':'<span class="badge loading" data-badge="'+mid(it.file)+'" data-main="'+(isMain?1:0)+'">…</span>';
    return '<a class="card'+(isMain?' main':'')+'" href="'+it.file+'">'
      +'<div class="card-top"><div class="thumb"><div class="thumb-frame"><iframe data-src="'+it.file+'?thumb=1" loading="lazy" tabindex="-1"></iframe></div></div>'+badge+'</div>'
      +'<div class="meta"><div class="t"><h3>'+label+'</h3><span>'+fmt(it.created)+'</span></div></div></a>';
  }
  function createCard(){return '<a class="card create-card" id="create-branch" href="#" role="button"><div class="create-inner"><div class="create-plus">+</div><div class="create-label">Create new lo-fi</div></div></a>';}
  function dashToast(m){var t=document.getElementById('dash-toast');if(!t)return;t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2800);}
  function namePrompt(onok){
    var ov=document.getElementById('np-overlay'),inp=document.getElementById('np-input');
    inp.value='';ov.classList.add('show');setTimeout(function(){inp.focus();},50);
    function close(){ov.classList.remove('show');}
    function submit(){var v=inp.value.trim();if(!v){inp.focus();return;}close();onok(v);}
    document.getElementById('np-cancel').onclick=close;
    document.getElementById('np-ok').onclick=submit;
    inp.onkeydown=function(e){if(e.key==='Enter')submit();else if(e.key==='Escape')close();};
    ov.onclick=function(e){if(e.target===ov)close();};
  }
  function wireCreate(){
    var c=document.getElementById('create-branch');if(!c)return;
    c.addEventListener('click',function(e){e.preventDefault();
      namePrompt(function(name){
        var p='Create a new lo-fi (branch) named "'+name+'" off Main in PMW Design Ops — duplicate the Main mockup as a new branch called "'+name+'", register it in iterations.json, and open it.';
        if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(p).catch(function(){});}
        dashToast('Prompt for “'+name+'” copied — paste it into Cowork.');
      });
    });
  }
  function esc(s){return (''+(s==null?'':s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function lazyThumbs(){
    if(!('IntersectionObserver' in window)){document.querySelectorAll('iframe[data-src]').forEach(function(f){f.src=f.getAttribute('data-src');f.removeAttribute('data-src');});return;}
    var io=window.__thumbIO||(window.__thumbIO=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){var f=e.target;if(f.getAttribute('data-src')){f.src=f.getAttribute('data-src');f.removeAttribute('data-src');}window.__thumbIO.unobserve(f);}});},{rootMargin:'250px'}));
    document.querySelectorAll('iframe[data-src]').forEach(function(f){io.observe(f);});
  }
  function changelogCard(){return '<div class="card cl-card" id="cl-card">'
    +'<div class="card-top"><div class="thumb"><div class="thumb-frame cl-frame"><div class="cl-card-prev" id="cl-card-prev"><div class="cl-card-empty">Loading…</div></div></div></div><span class="badge open" id="cl-card-foot"></span></div>'
    +'<div class="meta"><div class="t"><h3>Updates</h3><span id="cl-sub"></span></div></div>'
    +'</div>';}
  function wireChangelog(){
    var card=document.getElementById('cl-card'),ov=document.getElementById('cl-overlay');
    if(card)card.addEventListener('click',function(){ov.classList.add('show');});
    var x=document.getElementById('cl-close');if(x)x.onclick=function(){ov.classList.remove('show');};
    if(ov)ov.addEventListener('click',function(e){if(e.target===ov)ov.classList.remove('show');});
  }
  function loadChangelog(){
    var list=document.getElementById('cl-list'),prev=document.getElementById('cl-card-prev'),foot=document.getElementById('cl-card-foot');
    Promise.all([
      fetch(SB_URL+'/rest/v1/merges?select=branch,file,merged_by,merged_at&order=merged_at.desc&limit=100',{headers:H}).then(function(r){return r.ok?r.json():[];}).catch(function(){return [];}),
      fetch('iterations.json?b='+Date.now()).then(function(r){return r.json();}).catch(function(){return [];})
    ]).then(function(res){
        var rows=Array.isArray(res[0])?res[0]:[],iters=Array.isArray(res[1])?res[1]:[];
        // A merge is only real if the branch is actually marked merged in iterations.json.
        // This hides stray rows (e.g. from merely copying the merge prompt) and de-dupes per branch.
        var mergedFiles={};iters.forEach(function(it){if(it&&it.status==='merged'&&it.file)mergedFiles[it.file]=true;});
        var seen={},filtered=[];
        rows.forEach(function(m){if(m&&m.file&&mergedFiles[m.file]&&!seen[m.file]){seen[m.file]=true;filtered.push(m);}});
        rows=filtered;
        var sub=document.getElementById('cl-sub');
        if(!Array.isArray(rows)||!rows.length){
          if(prev)prev.innerHTML='<div class="cl-card-empty">No updates yet</div>';
          if(foot)foot.style.display='none';
          if(sub)sub.textContent='No updates yet';
          if(list)list.innerHTML='<div class="cl-empty">No merges yet — merged branches will show up here.</div>';
          return;
        }
        if(prev)prev.innerHTML=rows.slice(0,2).map(function(m){return '<div class="cl-prev-row"><div class="cl-prev-branch">'+esc(m.branch||'Branch')+'</div><div class="cl-prev-meta">'+esc(m.merged_by||'Someone')+' · '+fmt(m.merged_at)+'</div></div>';}).join('');
        if(sub)sub.textContent=fmt(rows[0].merged_at);
        if(foot){foot.style.display='';foot.textContent=''+rows.length;}
        if(list)list.innerHTML=rows.map(function(m){return '<a class="cl-row" href="'+esc(m.file||'#')+'"><span class="cl-branch">'+esc(m.branch||'Branch')+'</span><span class="cl-meta">merged by '+esc(m.merged_by||'Someone')+' · '+fmt(m.merged_at)+'</span><span class="cl-go">Open ›</span></a>';}).join('');
      }).catch(function(){if(prev)prev.innerHTML='<div class="cl-card-empty">No merges yet — merged branches appear here.</div>';if(foot)foot.style.display='none';});
  }
  function setBadge(file,isMain){
    var el=document.querySelector('[data-badge="'+mid(file)+'"]');if(!el)return;
    fetch(SB_URL+"/rest/v1/annotations?select=id&mockup=eq."+mid(file)+"&resolved=eq.false",{headers:H})
      .then(function(r){return r.json();}).then(function(rows){
        var n=Array.isArray(rows)?rows.length:0;
        if(isMain){el.className='badge main';el.textContent='Production';return;}
        if(n>0){el.className='badge open';el.textContent=n+(n===1?' Comment':' Comments');}
        else{el.className='badge ready';el.textContent='In progress';}
      }).catch(function(){el.className='badge';el.textContent='';});
  }
  Promise.all([fetch('iterations.json?b='+Date.now()).then(function(r){return r.json();}),fetch(SB_URL+'/rest/v1/iteration_names?select=mockup,name',{headers:H}).then(function(r){return r.json();}).catch(function(){return [];})]).then(function(_res){
    var list=_res[0],_names=_res[1];if(Array.isArray(_names))_names.forEach(function(x){namesMap[x.mockup]=x.name;});
    if(!Array.isArray(list)||!list.length){document.getElementById('main-wrap').outerHTML='<div class="empty">No mockups yet. Create one through Cowork.</div>';return;}
    var main=list.filter(function(it){return it.main;})[0]||list[0];
    var seen={},branchReps=[];
    list.forEach(function(it){if(it.branch&&!seen[it.branch]){seen[it.branch]=1;var grp=list.filter(function(x){return x.branch===it.branch;}).sort(function(a,b){return (a.n||0)-(b.n||0);});branchReps.push(grp[grp.length-1]);}});
    branchReps.sort(function(a,b){return (new Date(b.created||0))-(new Date(a.created||0));}); // newest first
    document.getElementById('main-wrap').innerHTML=card(main)+changelogCard();
    var bg=document.getElementById('branch-grid');bg.innerHTML=createCard();
    wireCreate();
    wireChangelog();
    var BRANCH_PAGE=18,shownB=0;
    function appendBranchPage(){
      var next=branchReps.slice(shownB,shownB+BRANCH_PAGE);
      bg.insertAdjacentHTML('beforeend',next.map(card).join(''));
      next.forEach(function(it){if(it.status!=='merged')setBadge(it.file,false);});
      shownB+=next.length;
      var more=document.getElementById('branch-more');
      more.style.display=(shownB<branchReps.length)?'':'none';
      if(shownB<branchReps.length)more.textContent='Load more ('+(branchReps.length-shownB)+')';
      lazyThumbs();
    }
    appendBranchPage();
    document.getElementById('branch-more').onclick=appendBranchPage;
    setBadge(main.file,true);
    lazyThumbs();
    loadChangelog();
  }).catch(function(){document.getElementById('main-wrap').outerHTML='<div class="empty">Could not load iterations.json. (Works once hosted.)</div>';});
</script>
</body>
</html>
