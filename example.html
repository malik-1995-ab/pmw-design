<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Example wireframe</title>
<style>
  body { margin:0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background:#fff; color:#1a1d21; }
  .bar { height:56px; border-bottom:1px solid #e5e7eb; display:flex; align-items:center; padding:0 20px; font-weight:700; }
  .body { padding:40px; }
  .box { background:#eef1f5; border:1px solid #e5e7eb; border-radius:10px; height:160px; margin-bottom:16px; }
  .row { display:flex; gap:16px; }
  .row .box { flex:1; }
</style>
</head>
<body>
  <div class="bar">Example wireframe — replace me</div>
  <div class="body">
    <div class="box"></div>
    <div class="row"><div class="box"></div><div class="box"></div></div>
  </div>
</body>
</html>
